<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleksandr Nechaev — Interactive Resume</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 720px;
            height: 90vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            background: #1a1a2e;
            color: #fff;
        }

        .chat-header h1 { font-size: 18px; font-weight: 600; }
        .chat-header p  { font-size: 13px; color: #a0a8c0; margin-top: 2px; }

        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #f44;
            margin-right: 6px;
            vertical-align: middle;
            transition: background 0.3s;
        }
        .status-dot.connected { background: #4caf50; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #1a1a2e;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #f0f2f5;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: flex-start;
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c6c6;
            border-bottom-left-radius: 4px;
        }

        .message.typing {
            align-self: flex-start;
            background: #f0f2f5;
            color: #888;
            font-style: italic;
        }

        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #e8eaf0;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            height: 44px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
            overflow-y: auto;
        }

        textarea:focus { border-color: #1a1a2e; }

        button {
            padding: 0 20px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            white-space: nowrap;
        }

        button:hover:not(:disabled) { background: #2d2d50; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1><span class="status-dot" id="statusDot"></span>Aleksandr Nechaev — Interactive Resume</h1>
        <p id="statusText">Connecting…</p>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Ask anything about Aleksandr…" disabled></textarea>
        <button id="sendBtn" disabled>Send</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"
        integrity="sha384-svdnwiXBL+Js+yUneJSRFy24NgGiOfDM/vkQl/vCeVrcbYD6yW8EwPr1FnxTEZsR"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"
        integrity="sha384-KkPQpaFjaz1MHqHBmeMM+CCG394NFgCN2Rhe/3Mqnb6/acgNnoWTF54PGijUKRjf"
        crossorigin="anonymous"></script>
<script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('sendBtn');
    const statusDot  = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let typingMsg = null;
    let waiting   = false;

    function appendMessage(text, type) {
        const el = document.createElement('div');
        el.className = `message ${type}`;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return el;
    }

    function setConnected(connected) {
        statusDot.className  = `status-dot ${connected ? 'connected' : ''}`;
        statusText.textContent = connected ? 'Connected' : 'Disconnected';
        inputEl.disabled  = !connected || waiting;
        sendBtn.disabled  = !connected || waiting;
    }

    function setWaiting(on) {
        waiting = on;
        inputEl.disabled = on;
        sendBtn.disabled = on;
        if (on) {
            typingMsg = appendMessage('Thinking…', 'typing');
        } else if (typingMsg) {
            typingMsg.remove();
            typingMsg = null;
        }
    }

    function send() {
        const text = inputEl.value.trim();
        if (!text || waiting) return;

        appendMessage(text, 'user');
        inputEl.value = '';
        inputEl.style.height = '44px';
        setWaiting(true);

        client.publish({
            destination: '/app/ask',
            body: JSON.stringify({ question: text })
        });
    }

    const client = new StompJs.Client({
        webSocketFactory: () => new SockJS('/ws'),
        reconnectDelay: 5000,

        onConnect: () => {
            setConnected(true);
            client.subscribe('/user/queue/answers', msg => {
                setWaiting(false);
                const body = JSON.parse(msg.body);
                appendMessage(body.answer, 'assistant');
            });
        },

        onDisconnect:     () => setConnected(false),
        onStompError:     () => setConnected(false),
        onWebSocketError: () => setConnected(false),
    });

    client.activate();

    sendBtn.addEventListener('click', send);

    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    inputEl.addEventListener('input', () => {
        inputEl.style.height = '44px';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
</script>

</body>
</html>
